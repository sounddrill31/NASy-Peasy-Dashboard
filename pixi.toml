[workspace]
authors = ["google-labs-jules[bot] <161369871+google-labs-jules[bot]@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "nasypeasy"
platforms = ["linux-64", "linux-aarch64"]
version = "0.1.0"

[dependencies]
python = ">=3.11,<3.13"
flask = ">=3.1.3,<4"
flask-login = ">=0.6.3,<0.7"
duckdb = ">=1.5.2,<2"
werkzeug = ">=3.1.8,<4"
pyyaml = ">=6.0.3,<7"
requests = ">=2.34.1,<3"
flask-wtf = ">=1.3.0,<2"
caddy = ">=2,<3"



[tasks]
server = {cmd="podman-compose -f docker-compose.yml up -d", depends-on=["host-agent", "caddy-start"] }
server-clean = {cmd="podman-compose -f docker-compose.yml up -d --build", depends-on=["host-agent", "caddy-start"] }
start = "python app.py"
create-user = "python create_user.py"
host-agent = "python host_agent.py --daemon"
add-shared-dir = "python add_shared_dir.py {args}"
caddy = "sh -c 'caddy run --config Caddyfile 2>&1 | tee -a caddy.log'"
caddy-start = "sh -c 'caddy start --config Caddyfile >> caddy.log 2>&1 || caddy reload --config Caddyfile >> caddy.log 2>&1 || true'"
caddy-stop = "caddy stop --config Caddyfile"
caddy-logs = "tail -f caddy.log"
