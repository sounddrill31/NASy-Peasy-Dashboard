[workspace]
authors = ["google-labs-jules[bot] <161369871+google-labs-jules[bot]@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "nasypeasy"
platforms = ["linux-64", "linux-aarch64"]
version = "0.1.0"

[dependencies]
python = ">=3.11,<3.13"
flask = ">=3.1.3,<4"
flask-login = ">=0.6.3,<0.7"
duckdb = ">=1.5.2,<2"
werkzeug = ">=3.1.8,<4"
pyyaml = ">=6.0.3,<7"
requests = ">=2.34.1,<3"
flask-wtf = ">=1.3.0,<2"
caddy = ">=2,<3"
nginx = ">=1.31.1,<2"



[tasks]
setup = "bash setup.sh"
up = {cmd="podman-compose -f docker-compose.yml up -d", depends-on=["host-agent", "caddy-start"] }
fresh = {cmd="podman-compose -f docker-compose.yml up -d --build", depends-on=["host-agent", "caddy-start"] }
start = "python app.py"
create-user = "python create_user.py"
host-agent = "python host_agent.py --daemon"
add-shared-dir = "python add_shared_dir.py {args}"
caddy-start = "[ -f \"$(pwd)/Caddyfile\" ] && (caddy stop 2>/dev/null; sleep 1; caddy start --config \"$(pwd)/Caddyfile\" 2>/dev/null || caddy run --config \"$(pwd)/Caddyfile\" &) || true"
caddy-reload = "[ -f \"$(pwd)/Caddyfile\" ] && caddy reload --config \"$(pwd)/Caddyfile\" || true"
caddy-stop = "caddy stop 2>/dev/null || true"
caddy-logs = "tail -f logs/caddy.log"
nginx-start = "pkill -f 'nginx.*nginx.conf' 2>/dev/null; sleep 1; nginx -c \"$(pwd)/nginx.conf\""
nginx-stop = "nginx -s stop -c \"$(pwd)/nginx.conf\" 2>/dev/null || true"
nginx-reload = "nginx -s reload -c \"$(pwd)/nginx.conf\" 2>/dev/null || true"
nginx-logs = "tail -f logs/nginx-error.log"
restart = "podman-compose -f docker-compose.yml down 2>/dev/null; pkill -f 'host_agent.py' 2>/dev/null; sleep 1; podman-compose -f docker-compose.yml up -d --build; python host_agent.py --daemon; [ -f \"$(pwd)/Caddyfile\" ] && caddy reload --config \"$(pwd)/Caddyfile\" || true; nginx -s reload -c \"$(pwd)/nginx.conf\" 2>/dev/null || true"
teardown = "bash teardown.sh"
