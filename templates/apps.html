{% extends "base.html" %}
{% block title %}App Store - Nasypeasy{% endblock %}
{% block content %}
<div class="mb-8 flex justify-between items-end border-b-4 border-black pb-4">
    <h2 class="text-3xl font-bold uppercase">App Store</h2>
    <a href="{{ url_for('dashboard') }}" class="text-sm font-bold hover:underline decoration-2">&lt;- BACK TO DASHBOARD</a>
</div>

<div class="mb-12 border-4 border-black p-6">
    <h3 class="text-lg font-bold uppercase mb-4 border-b-2 border-dashed border-black pb-2">Add External Repository</h3>
    <form method="GET" class="flex gap-4">
        <input type="text" name="repo_url" value="{{ repo_url or '' }}" placeholder="https://example.com/apps.yaml" class="flex-grow border-2 border-black p-3 focus:outline-none focus:ring-4 focus:ring-black/20 font-mono text-sm">
        <button type="submit" class="bg-black text-white font-bold px-8 hover:bg-white hover:text-black border-4 border-black transition-colors uppercase tracking-wider">
            Fetch
        </button>
    </form>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    {% for app in apps %}
        <div class="border-4 border-black p-6 flex flex-col relative group hover:-translate-y-1 hover:shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] transition-all">
            <div class="mb-4">
                <h4 class="text-2xl font-bold uppercase">{{ app.name }}</h4>
                <p class="mt-2 text-sm text-gray-700 h-12 overflow-hidden">{{ app.description }}</p>
            </div>
            <div class="mt-auto pt-4 border-t-2 border-black">
                <form method="POST" action="{{ url_for('apps.deploy_app') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="command" value="{{ app.command }}">
                    <button type="submit" class="w-full bg-white text-black font-bold p-3 border-4 border-black hover:bg-black hover:text-white transition-colors uppercase tracking-widest text-sm">
                        Deploy +
                    </button>
                </form>
            </div>
        </div>
    {% else %}
        <div class="col-span-full text-center py-16 border-4 border-dashed border-black">
            <p class="text-2xl font-bold uppercase text-gray-400">No apps available in current sources.</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
