{% extends "base.html" %}
{% block title %}Login - Nasypeasy{% endblock %}
{% block content %}
<div class="max-w-md mx-auto border-4 border-black p-8">
    <h2 class="text-2xl font-bold mb-6 uppercase border-b-2 border-black pb-2">Login</h2>
    <form method="POST" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div>
            <label class="block text-sm font-bold uppercase mb-2">Username</label>
            <input type="text" name="username" required class="w-full border-2 border-black p-3 focus:outline-none focus:ring-4 focus:ring-black/20 font-mono">
        </div>
        <div>
            <label class="block text-sm font-bold uppercase mb-2">Password</label>
            <input type="password" name="password" required class="w-full border-2 border-black p-3 focus:outline-none focus:ring-4 focus:ring-black/20 font-mono">
        </div>
        <button type="submit" class="w-full bg-black text-white font-bold p-4 hover:bg-white hover:text-black hover:border-black border-4 border-black transition-colors uppercase tracking-widest">
            Authenticate
        </button>
    </form>
    <div class="mt-6 pt-6 border-t-2 border-dashed border-black text-center text-sm">
    </div>
</div>
{% endblock %}
