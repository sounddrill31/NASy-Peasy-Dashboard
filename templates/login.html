{% extends "base.html" %}
{% block title %}Login - NASYPEASY{% endblock %}
{% block body %}
<div class="w-full max-w-sm mx-auto border-4 border-black p-6 sm:p-8">
    <h2 class="text-xl sm:text-2xl font-bold mb-6 uppercase border-b-2 border-black pb-2">Login</h2>
    <form method="POST" class="space-y-5 sm:space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div>
            <label class="block text-[10px] sm:text-sm font-bold uppercase mb-2">Username</label>
            <input type="text" name="username" required class="w-full border-2 border-black p-3 focus:outline-none focus:ring-4 focus:ring-black/20 font-mono text-sm">
        </div>
        <div>
            <label class="block text-[10px] sm:text-sm font-bold uppercase mb-2">Password</label>
            <input type="password" name="password" required class="w-full border-2 border-black p-3 focus:outline-none focus:ring-4 focus:ring-black/20 font-mono text-sm">
        </div>
        <button type="submit" class="w-full bg-black text-white font-bold p-3 sm:p-4 hover:bg-white hover:text-black hover:border-black border-4 border-black transition-colors uppercase tracking-widest text-sm">
            Authenticate
        </button>
    </form>
</div>
{% endblock %}
