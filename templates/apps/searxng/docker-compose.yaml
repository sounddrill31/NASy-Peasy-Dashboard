services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: nasypeasy-searxng
    ports:
      - "8888:8080"
    volumes:
      - searxng-data:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=$PUBLIC_URL
    cap_add:
      - CHOWN
    restart: unless-stopped

volumes:
  searxng-data:
